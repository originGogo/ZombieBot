name: Build Windows App

on:
  push:
    branches: ["main"] # 当你提交代码到 main 分支时自动触发打包
  workflow_dispatch: # 允许你在网页上手动点击按钮打包

jobs:
  build-windows:
    runs-on: windows-latest # 租用微软的 Windows 云端服务器

    steps:
      - name: 获取代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.10" # 使用稳定的 Python 3.10

      - name: 安装所有依赖包
        run: |
          python -m pip install --upgrade pip
          pip install pyautogui easyocr pillow opencv-python-headless numpy pyinstaller

      - name: 执行 PyInstaller 打包
        run: |
          pyinstaller --onedir --console --name ZombieBot main.py

      - name: 上传打包成品
        uses: actions/upload-artifact@v4
        with:
          name: ZombieBot-Windows-绿色免安装版 # 用户下载时的压缩包名称
          path: dist/ZombieBot # 把整个包含了独立环境的文件夹打包进去
